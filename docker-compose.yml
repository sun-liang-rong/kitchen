services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kitchen-wish-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-kitchen}:${POSTGRES_PASSWORD:-kitchen}@postgres:5432/${POSTGRES_DB:-kitchen_wish_well}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-kitchen-wish-well-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      STORAGE_DRIVER: local
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - server_uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    container_name: kitchen-wish-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kitchen_wish_well}
      POSTGRES_USER: ${POSTGRES_USER:-kitchen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kitchen}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitchen -d kitchen_wish_well"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kitchen-wish-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  server_uploads:
