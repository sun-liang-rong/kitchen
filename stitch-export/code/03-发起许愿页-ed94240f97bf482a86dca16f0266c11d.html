<script>
        document.addEventListener('DOMContentLoaded', () => {
            const chips = document.querySelectorAll('.chip-btn');
            
            // Active styles for chips based on Design System (Tertiary/Primary overlay, 40% opacity feel)
            const activeClasses = ['bg-primary-container/20', 'text-primary', 'border-primary-fixed-dim'];
            const inactiveClasses = ['bg-surface-container-low', 'text-on-surface-variant', 'border-transparent'];
            const helpActiveClasses = ['bg-primary-container/30', 'text-on-primary-container', 'border-primary-container'];
            const helpInactiveClasses = ['bg-surface-container-lowest', 'text-on-surface-variant', 'border-surface-variant'];

            chips.forEach(chip => {
                chip.addEventListener('click', function() {
                    const group = this.dataset.group;
                    const isSingleSelect = this.classList.contains('single-select');
                    const isHelpGroup = group === 'help';

                    if (isSingleSelect) {
                        // Deselect others in the same group
                        const siblings = document.querySelectorAll(`.chip-btn[data-group="${group}"]`);
                        siblings.forEach(sib => {
                            if (sib !== this) {
                                sib.classList.remove(...activeClasses);
                                sib.classList.add(...inactiveClasses);
                            }
                        });
                    }

                    // Toggle current chip
                    if (isHelpGroup) {
                        if (this.classList.contains(helpActiveClasses[0])) {
                            this.classList.remove(...helpActiveClasses);
                            this.classList.add(...helpInactiveClasses);
                        } else {
                            this.classList.remove(...helpInactiveClasses);
                            this.classList.add(...helpActiveClasses);
                        }
                    } else {
                        if (this.classList.contains(activeClasses[0])) {
                            if (!isSingleSelect) { // Allow deselect for multi-select
                                this.classList.remove(...activeClasses);
                                this.classList.add(...inactiveClasses);
                            }
                        } else {
                            this.classList.remove(...inactiveClasses);
                            this.classList.add(...activeClasses);
                        }
                    }
                });
            });
        });
    </script>
